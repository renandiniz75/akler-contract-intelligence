services:
  - type: web
    name: akler-contract-intelligence
    runtime: node
    plan: starter
    buildCommand: npm install && npm run render-build
    startCommand: npm run start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: akler-contract-intelligence-db
          property: connectionString
      - key: AUTH_SECRET
        generateValue: true
      - key: AUTH_TRUST_HOST
        value: "true"
      - key: NEXT_PUBLIC_APP_URL
        sync: false

databases:
  - name: akler-contract-intelligence-db
    plan: starter
